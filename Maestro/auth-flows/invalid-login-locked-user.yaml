appId: ${APP_ID}
---
- launchApp:
    clearState: true
- tapOn: "Don't Show Again"
- tapOn: ${MENU_BUTTON}
- tapOn: ${MENU_LOGIN_BUTTON}
- tapOn:
    id: ${USERNAME_FIELD}
- inputText: "alice@example.com"
- tapOn:
    id: ${PASSWORD_FIELD}
- inputText: "10203040"
- tapOn: ${LOGIN_BUTTON}
- assertVisible: "Sorry this user has been locked out."
